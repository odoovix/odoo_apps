<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
    <title id="title">Advance Search and Quick Search for Odoo 19</title>
    <desc id="desc">Attractive marketplace banner for the Odoo quick advanced search module.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#170b3f"/>
            <stop offset="0.48" stop-color="#3b1b70"/>
            <stop offset="1" stop-color="#7b2d91"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#f4a000"/>
            <stop offset="1" stop-color="#ffca45"/>
        </linearGradient>
        <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#f5f2fb"/>
        </linearGradient>
        <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#714b8f"/>
            <stop offset="1" stop-color="#9c5fb4"/>
        </linearGradient>
        <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0c0524" flood-opacity="0.35"/>
        </filter>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#160a34" flood-opacity="0.22"/>
        </filter>
    </defs>

    <rect width="1600" height="900" fill="url(#bg)"/>
    <circle cx="1445" cy="70" r="245" fill="#ffffff" opacity="0.08"/>
    <circle cx="112" cy="812" r="238" fill="#05021b" opacity="0.34"/>
    <circle cx="1260" cy="870" r="330" fill="#f4a000" opacity="0.14"/>
    <path d="M0 645 C260 548 360 713 610 620 C840 535 910 337 1200 410 C1375 455 1484 380 1600 318 L1600 900 L0 900 Z" fill="#ffffff" opacity="0.055"/>

    <g transform="translate(72 64)" filter="url(#softShadow)">
        <rect width="172" height="172" rx="36" fill="#1b103d" opacity="0.92"/>
        <text x="36" y="69" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900" letter-spacing="2">ODOO</text>
        <text x="34" y="119" fill="#e39a00" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="900">VIX</text>
    </g>

    <g transform="translate(72 282)">
        <rect x="0" y="0" width="138" height="40" rx="20" fill="url(#accent)"/>
        <text x="22" y="27" fill="#201248" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900">ODOO 19</text>
        <text x="0" y="116" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" letter-spacing="1">ADVANCE</text>
        <text x="0" y="190" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" letter-spacing="1">SEARCH</text>
        <text x="0" y="266" fill="#f0dcff" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800">&amp; QUICK SEARCH</text>
        <text x="0" y="330" fill="#dac8ef" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="500">Dynamic search fields for any model</text>
        <text x="0" y="370" fill="#dac8ef" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="500">directly inside Odoo list views.</text>

        <g transform="translate(0 414)" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">
