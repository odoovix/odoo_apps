                <text x="30" y="135" font-weight="800">S00014</text>
                <text x="155" y="135">Jun 5, 10:34 AM</text>
                <text x="325" y="135">Gemini Furniture</text>
                <text x="520" y="135">$ 1,582.00</text>
                <rect x="625" y="115" width="92" height="24" rx="12" fill="#2fb344"/>
                <text x="640" y="133" fill="#ffffff" font-size="12" font-weight="900">Sales Order</text>

                <rect x="0" y="154" width="766" height="1" fill="#ebe6f2"/>
                <text x="30" y="188" font-weight="800">S00013</text>
                <text x="155" y="188">Jun 5, 10:34 AM</text>
                <text x="325" y="188">Gemini Furniture</text>
                <text x="520" y="188">$ 415.50</text>
                <rect x="625" y="168" width="92" height="24" rx="12" fill="#2fb344"/>
                <text x="640" y="186" fill="#ffffff" font-size="12" font-weight="900">Sales Order</text>

                <rect x="0" y="207" width="766" height="1" fill="#ebe6f2"/>
                <text x="30" y="241" font-weight="800">S00007</text>
                <text x="155" y="241">Jun 5, 10:34 AM</text>
                <text x="325" y="241">Gemini Furniture</text>
                <text x="520" y="241">$ 1,706.00</text>
                <rect x="625" y="221" width="92" height="24" rx="12" fill="#2fb344"/>
                <text x="640" y="239" fill="#ffffff" font-size="12" font-weight="900">Sales Order</text>
            </g>
        </g>

        <g transform="translate(590 508)">
            <rect width="190" height="54" rx="27" fill="#201248" opacity="0.92"/>
            <path d="M34 27 l14 14 l33 -35" fill="none" stroke="#ffca45" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="92" y="35" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900">Matched</text>
        </g>
    </g>

    <g transform="translate(72 792)" font-family="Arial, Helvetica, sans-serif">
        <text fill="#f0dcff" font-size="27" font-weight="600">Add configurable search boxes to Odoo list views without changing every model manually.</text>
    </g>
