            <rect x="212" y="48" width="204" height="38" rx="7" fill="#f8f6fb" stroke="#ddd4e8"/>
            <text x="228" y="73" fill="#b0a6bb" font-family="Arial, Helvetica, sans-serif" font-size="15">contains...</text>
            <rect x="445" y="48" width="150" height="38" rx="7" fill="#f8f6fb" stroke="#ddd4e8"/>
            <text x="461" y="73" fill="#b0a6bb" font-family="Arial, Helvetica, sans-serif" font-size="15">contains...</text>
            <rect x="622" y="48" width="122" height="38" rx="7" fill="#f8f6fb" stroke="#ddd4e8"/>
            <text x="640" y="73" fill="#714b8f" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800">Jun 5</text>
