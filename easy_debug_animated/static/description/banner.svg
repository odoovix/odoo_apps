<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Easy Debug Animated banner</title>
  <desc id="desc">Purple Odoo Vix branded banner for the Easy Debug Animated Odoo module.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d0a6e"/>
      <stop offset="48%" stop-color="#5b158f"/>
      <stop offset="100%" stop-color="#2a0f62"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#180947"/>
      <stop offset="100%" stop-color="#55218a"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f4aa0"/>
      <stop offset="100%" stop-color="#4e2b84"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#180947" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="70" cy="120" r="110" fill="#ffffff" opacity="0.05"/>
  <circle cx="1415" cy="95" r="185" fill="#ffffff" opacity="0.08"/>
  <circle cx="118" cy="785" r="175" fill="#26094f" opacity="0.62"/>
  <circle cx="1488" cy="804" r="220" fill="#26094f" opacity="0.7"/>
  <circle cx="812" cy="870" r="525" fill="#8a1cc7" opacity="0.34"/>

  <g transform="translate(55 55)">
    <rect x="0" y="0" width="210" height="210" rx="38" fill="url(#logoBg)" filter="url(#softShadow)"/>
    <circle cx="172" cy="20" r="32" fill="#ffffff" opacity="0.04"/>
    <text x="44" y="78" fill="#ffffff" font-family="Arial, sans-serif" font-size="38" font-weight="800" letter-spacing="2">ODOO</text>
    <text x="43" y="136" fill="#f5a400" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900">VIX</text>
  </g>

  <text x="292" y="147" fill="#ffffff" font-family="Arial, sans-serif" font-size="68" font-weight="900" letter-spacing="3">DEBUG PARTY PAPER</text>
  <text x="294" y="196" fill="#dbc5ef" font-family="Arial, sans-serif" font-size="32">Developer mode toggle with full-page paper celebration for Odoo 17</text>

  <g font-family="Arial, sans-serif" font-size="24" fill="#ffffff">
    <rect x="290" y="220" width="170" height="45" rx="22" fill="url(#pill)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="315" y="251">Debug On</text>
    <rect x="480" y="220" width="175" height="45" rx="22" fill="url(#pill)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="506" y="251">Debug Off</text>
    <rect x="675" y="220" width="252" height="45" rx="22" fill="url(#pill)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="702" y="251">Full Page Paper</text>
  </g>

  <rect x="58" y="296" width="1485" height="465" rx="28" fill="#32146f" opacity="0.78" stroke="#ffffff" stroke-opacity="0.12"/>

  <g transform="translate(100 335)">
    <rect x="0" y="0" width="432" height="346" rx="24" fill="#ffffff"/>
    <rect x="0" y="0" width="432" height="45" rx="22" fill="#e9eef6"/>
    <rect x="38" y="70" width="344" height="29" rx="14" fill="#d5deeb"/>
    <rect x="38" y="114" width="318" height="18" rx="9" fill="#cbd6e6"/>
    <rect x="38" y="148" width="318" height="18" rx="9" fill="#cbd6e6"/>
    <rect x="38" y="182" width="318" height="18" rx="9" fill="#cbd6e6"/>
    <rect x="38" y="216" width="318" height="18" rx="9" fill="#cbd6e6"/>
    <rect x="38" y="250" width="318" height="18" rx="9" fill="#cbd6e6"/>
    <text x="64" y="391" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="800">Compact debug button</text>
  </g>

  <g transform="translate(590 335)">
    <rect x="0" y="0" width="432" height="346" rx="24" fill="#ffffff"/>
    <rect x="118" y="34" width="120" height="46" rx="23" fill="#263238"/>
    <circle cx="145" cy="57" r="13" fill="#f5a400"/>
    <text x="168" y="65" fill="#ffffff" font-family="Arial, sans-serif" font-size="23" font-weight="800">On</text>
    <rect x="106" y="100" width="230" height="170" rx="18" fill="#faf6ff" stroke="#c7a6e8"/>
    <text x="126" y="147" fill="#9b70b6" font-family="Arial, sans-serif" font-size="24">TOGGLE DEBUG</text>
    <circle cx="130" cy="184" r="10" fill="none" stroke="#9b70b6" stroke-width="4"/>
    <text x="154" y="193" fill="#3a2361" font-family="Arial, sans-serif" font-size="24">Developer On</text>
    <circle cx="130" cy="226" r="10" fill="none" stroke="#9b70b6" stroke-width="4"/>
    <text x="154" y="235" fill="#3a2361" font-family="Arial, sans-serif" font-size="24">Developer Off</text>
    <text x="50" y="391" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="800">On / Off developer mode</text>
  </g>

  <g transform="translate(1080 335)">
    <rect x="0" y="0" width="432" height="346" rx="24" fill="#ffffff"/>
    <rect x="38" y="70" width="296" height="21" rx="10" fill="#cbd6e6"/>
    <rect x="38" y="112" width="265" height="21" rx="10" fill="#cbd6e6"/>
    <rect x="38" y="154" width="240" height="21" rx="10" fill="#cbd6e6"/>
    <rect x="38" y="196" width="202" height="21" rx="10" fill="#cbd6e6"/>
    <g>
      <rect x="58" y="34" width="15" height="28" rx="3" fill="#00a09d" transform="rotate(-28 65 48)"/>
      <rect x="165" y="33" width="15" height="28" rx="3" fill="#f05a5f" transform="rotate(32 172 47)"/>
      <rect x="286" y="42" width="15" height="28" rx="3" fill="#fbb945" transform="rotate(-42 293 56)"/>
      <rect x="352" y="108" width="15" height="28" rx="3" fill="#2f80ed" transform="rotate(28 360 122)"/>
      <rect x="332" y="202" width="15" height="28" rx="3" fill="#875a7b" transform="rotate(-19 340 216)"/>
      <rect x="252" y="268" width="15" height="28" rx="3" fill="#22c55e" transform="rotate(38 260 282)"/>
    </g>
    <text x="78" y="391" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="800">Bottom to top paper</text>
  </g>

  <text x="800" y="839" text-anchor="middle" fill="#d9c0ed" font-family="Arial, sans-serif" font-size="28">
    Click Debug On or Debug Off and throw celebration paper across the whole Odoo page.
  </text>
  <g transform="translate(1470 780)">
    <rect x="0" y="0" width="90" height="90" rx="16" fill="url(#logoBg)"/>
    <text x="18" y="34" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="800">ODOO</text>
    <text x="20" y="58" fill="#f5a400" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900">VIX</text>
  </g>
</svg>
