<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
</head>
<body class="m-0 p-0">

<div class="oe_container" style="background:#172026; color:#111827; padding:32px 18px;">
    <div style="max-width:1180px; margin:0 auto;">
        <section style="text-align:center; color:#fff; padding:18px 0 28px;">
            <h1 style="font-size:42px; line-height:1.15; margin:0 0 12px; font-weight:800;">
                Easy Debug Animated
            </h1>
            <p style="font-size:18px; line-height:1.55; max-width:760px; margin:0 auto; color:#d1d5db;">
                A compact Odoo 18 developer mode toggle with full-page party paper animation.
            </p>
        </section>

        <section style="background:#fff; border-radius:8px; padding:24px; margin-bottom:22px;">
            <img src="banner.png" alt="Easy Debug Animated banner" style="width:100%; border-radius:8px; display:block;"/>
        </section>

        <section style="background:#fff; border-radius:8px; padding:24px; margin-bottom:22px;">
            <h2 style="font-size:26px; margin:0 0 12px;">Debug On / Off Button</h2>
            <p style="font-size:16px; line-height:1.55; margin:0 0 20px; color:#4b5563;">
                The red mark highlights the compact top-bar button used to activate and deactivate developer mode.
            </p>
            <img src="assets/screenshots/debug-on-marked.png" alt="Debug On button marked in red" style="width:100%; border:1px solid #e5e7eb; border-radius:8px; display:block; margin-bottom:18px;"/>
            <img src="assets/screenshots/debug-off-marked.png" alt="Debug Off button marked in red" style="width:100%; border:1px solid #e5e7eb; border-radius:8px; display:block;"/>
        </section>

        <section style="background:#fff; border-radius:8px; padding:24px; margin-bottom:22px;">
            <h2 style="font-size:26px; margin:0 0 12px;">GIF Preview</h2>
            <img src="assets/gif/debug-on-off-marked.gif" alt="Debug On Off marked GIF preview" style="width:100%; border:1px solid #e5e7eb; border-radius:8px; display:block;"/>
        </section>

        <section style="background:#fff; border-radius:8px; padding:24px;">
            <h2 style="font-size:26px; margin:0 0 12px;">Video Demo</h2>
            <video controls muted style="width:100%; border:1px solid #e5e7eb; border-radius:8px; display:block;">
                <source src="assets/video/easy-debug-animated-demo.webm" type="video/webm"/>
            </video>
        </section>
    </div>
</div>

</body>
</html>
