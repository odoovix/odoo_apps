<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="30" x2="1100" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1730"/>
      <stop offset="1" stop-color="#26124D"/>
    </linearGradient>
    <linearGradient id="title" x1="200" y1="220" x2="650" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.62" stop-color="#76B8FF"/>
      <stop offset="1" stop-color="#19D3A6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#203354"/>
      <stop offset="1" stop-color="#142540"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="620" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#020817" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <circle cx="144" cy="102" r="190" fill="#1E4E93" fill-opacity="0.16"/>
  <circle cx="1032" cy="108" r="180" fill="#11C98F" fill-opacity="0.12"/>
  <circle cx="960" cy="530" r="190" fill="#7C4DFF" fill-opacity="0.12"/>

  <rect x="84" y="92" width="282" height="42" rx="21" fill="#14233C" stroke="#294566"/>
  <circle cx="108" cy="113" r="6" fill="#14B8FF"/>
  <text x="126" y="118" fill="#C9D6EA" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2.1">PREMIUM ODOO APPS THEME</text>

  <text x="84" y="190" fill="#FFB44D" font-family="Arial, sans-serif" font-size="23" font-weight="700" letter-spacing="3.2">TRACK ANY FIELD CHANGE WITHOUT CODE</text>
  <text x="84" y="286" fill="url(#title)" font-family="Arial, sans-serif" font-size="72" font-weight="700">Auto Field Tracker</text>

  <text x="84" y="360" fill="#C9D6EA" font-family="Arial, sans-serif" font-size="26">Turn every important record change into a clean audit story.</text>
  <text x="84" y="398" fill="#C9D6EA" font-family="Arial, sans-serif" font-size="26">Track create, update, delete, and line changes with a polished</text>
  <text x="84" y="436" fill="#C9D6EA" font-family="Arial, sans-serif" font-size="26">no-code workflow built for serious Odoo deployments.</text>

  <g>
    <rect x="84" y="484" width="138" height="46" rx="23" fill="#183B64" stroke="#32659A"/>
    <text x="116" y="513" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">No code setup</text>

    <rect x="236" y="484" width="174" height="46" rx="23" fill="#15374B" stroke="#2B5F7E"/>
    <text x="267" y="513" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Chatter audit trail</text>

    <rect x="424" y="484" width="156" height="46" rx="23" fill="#183B64" stroke="#32659A"/>
    <text x="455" y="513" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Searchable logs</text>

    <rect x="594" y="484" width="167" height="46" rx="23" fill="#15374B" stroke="#2B5F7E"/>
    <text x="625" y="513" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">One2many tracking</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="752" y="78" width="380" height="466" rx="28" fill="#101D34" stroke="#34496B"/>
    <rect x="774" y="100" width="336" height="54" rx="18" fill="#1B2A45" stroke="#304765"/>
    <circle cx="800" cy="127" r="6" fill="#FF6B5F"/>
    <circle cx="820" cy="127" r="6" fill="#FFBD4D"/>
    <circle cx="840" cy="127" r="6" fill="#2ACD55"/>
    <text x="915" y="132" text-anchor="middle" fill="#D6E0EF" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.2">FEATURE PREVIEW</text>
    <text x="1064" y="132" fill="#AAB7CB" font-family="Arial, sans-serif" font-size="13" font-weight="700">Auto Field Tracker</text>

    <rect x="774" y="176" width="336" height="240" rx="22" fill="#EEF3FF"/>
    <image href="img/1.png" x="788" y="190" width="308" height="212" preserveAspectRatio="xMidYMin slice"/>

    <rect x="774" y="430" width="156" height="92" rx="20" fill="url(#card)" stroke="#2E4260"/>
    <text x="792" y="458" fill="#FFB44D" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">DESKTOP VIEW</text>
    <text x="792" y="486" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24" font-weight="700">Wide audit</text>
    <text x="792" y="513" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24" font-weight="700">workspace</text>

    <rect x="946" y="430" width="164" height="92" rx="20" fill="#172842" stroke="#2E4260"/>
    <rect x="960" y="444" width="62" height="50" rx="10" fill="#EEF3FF"/>
    <image href="img/2.png" x="963" y="447" width="56" height="44" preserveAspectRatio="xMidYMin slice"/>
    <rect x="1030" y="444" width="62" height="50" rx="10" fill="#EEF3FF"/>
    <image href="img/3.png" x="1033" y="447" width="56" height="44" preserveAspectRatio="xMidYMin slice"/>
    <text x="963" y="510" fill="#C9D6EA" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">CONFIG + LOGS</text>
  </g>
</svg>
