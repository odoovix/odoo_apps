<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="120" y1="60" x2="1060" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121C33"/>
      <stop offset="1" stop-color="#2C1551"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="1200" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#020617" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg2)"/>
  <text x="84" y="92" fill="#FFB44D" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2.2">STORE SHOWCASE</text>
  <text x="84" y="150" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="54" font-weight="700">Desktop screenshots with a richer visual frame</text>
  <text x="84" y="194" fill="#C9D6EA" font-family="Arial, sans-serif" font-size="24">Odoo Apps is more reliable with image-based presentation than CSS-based slides.</text>

  <g filter="url(#softShadow)">
    <rect x="84" y="244" width="700" height="420" rx="28" fill="#FFFFFF"/>
    <image href="img/1.png" x="102" y="262" width="664" height="384" preserveAspectRatio="xMidYMin slice"/>

    <rect x="822" y="244" width="294" height="194" rx="24" fill="#FFFFFF"/>
    <image href="img/2.png" x="838" y="260" width="262" height="120" preserveAspectRatio="xMidYMin slice"/>
    <text x="844" y="408" fill="#1C2A42" font-family="Arial, sans-serif" font-size="24" font-weight="700">Configuration Screen</text>

    <rect x="822" y="470" width="294" height="194" rx="24" fill="#FFFFFF"/>
    <image href="img/3.png" x="838" y="486" width="262" height="120" preserveAspectRatio="xMidYMin slice"/>
    <text x="844" y="634" fill="#1C2A42" font-family="Arial, sans-serif" font-size="24" font-weight="700">Tracking Logs</text>
  </g>
</svg>
